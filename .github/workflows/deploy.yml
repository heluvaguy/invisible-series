name: Deploy The Invisible Series

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install — Book I
        working-directory: invisible-interface
        run: npm install

      - name: Build — Book I
        working-directory: invisible-interface
        run: npm run build

      - name: Install — Book II
        working-directory: "invisible-series/Invisible Dashboard"
        run: npm install

      - name: Build — Book II
        working-directory: "invisible-series/Invisible Dashboard"
        run: npm run build

      - name: Assemble dist
        run: |
          # Series landing at heluvaguy.github.io/invisible-series/
          mkdir -p dist
          cp index.html dist/index.html

          # Book I at heluvaguy.github.io/invisible-series/invisible-interface/
          mkdir -p dist/invisible-interface
          cp -r invisible-interface/dist/. dist/invisible-interface/

          # Book II at heluvaguy.github.io/invisible-series/invisible-dashboard/
          mkdir -p dist/invisible-dashboard
          cp -r "invisible-series/Invisible Dashboard/dist/." dist/invisible-dashboard/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
